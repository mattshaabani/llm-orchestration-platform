# Routing settings
routing:
  simple_model: "mistralai/Mistral-7B-Instruct-v0.3"
  complex_model: "mistralai/Mixtral-8x7B-Instruct-v0.1"
  complexity_threshold: 0.5

# Caching settings
cache:
  enabled: true
  similarity_threshold: 0.92     # cosine similarity to count as a cache hit
  ttl_seconds: 3600               # cache entry lifetime
  embedding_model: "all-MiniLM-L6-v2"

# Rate limiting
rate_limit:
  requests_per_minute: 60
  burst_size: 10                  # token bucket capacity
  algorithm: "token_bucket"

# Retry settings
retry:
  max_retries: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 30.0
  exponential_base: 2

# Cost tracking (USD per 1M tokens, approximate)
cost:
  simple_model_input_cost:  0.0
  simple_model_output_cost: 0.0
  complex_model_input_cost: 0.0
  complex_model_output_cost: 0.0